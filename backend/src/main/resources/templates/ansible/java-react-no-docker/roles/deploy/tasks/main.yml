---
# ============================================
# 1. Проверка системных сервисов
# ============================================
- name: Ensure PostgreSQL and Nginx are running
  service:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - postgresql
    - nginx

# ============================================
# 2. Подготовка директорий и прав
# ============================================
- name: Create directories with sys_ansible ownership
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0755'
  loop:
    - "{{ app_dir }}"
    - "{{ web_root }}"
    - "/tmp/{{ project_name }}"

# ============================================
# 3. База данных: Скачивание и выполнение SQL
# ============================================
- name: Download database scripts
  get_url:
    url: "{{ nexus_url }}/repository/{{ nexus_repo }}/{{ project_name }}/{{ pipeline_id }}/database/database.tar.gz"
    dest: "/tmp/{{ project_name }}/database.tar.gz"
    url_username: "{{ nexus_user }}"
    url_password: "{{ nexus_password }}"

- name: Unpack database scripts
  unarchive:
    src: "/tmp/{{ project_name }}/database.tar.gz"
    dest: "{{ app_dir }}/database"
    remote_src: yes
    owner: "{{ deploy_user }}"

- name: Execute SQL scripts for database initialization
  shell: |
    for f in {{ app_dir }}/database/*.sql; do
      PGPASSWORD="{{ db_password }}" psql -h {{ db_host }} -p {{ db_port }} -U {{ db_user }} -d {{ db_name }} -f "$f"
    done
  ignore_errors: yes # Игнорируем, если таблицы уже существуют

# ============================================
# 4. Бэкенд: Деплой и Systemd (Пример для JAVA)
# ============================================
- name: Download backend JAR
  get_url:
    url: "{{ nexus_url }}/repository/{{ nexus_repo }}/{{ project_name }}/{{ pipeline_id }}/backend/backend.jar"
    dest: "{{ app_dir }}/backend.jar"
    url_username: "{{ nexus_user }}"
    url_password: "{{ nexus_password }}"
    owner: "{{ deploy_user }}"
    mode: '0744'

- name: Generate Systemd Service
  copy:
    dest: "/etc/systemd/system/{{ project_name }}.service"
    content: |
      [Unit]
      Description={{ project_name }} backend
      After=postgresql.service network.target

      [Service]
      User={{ deploy_user }}
      WorkingDirectory={{ app_dir }}
      Environment="DB_HOST={{ db_host }}"
      Environment="DB_PORT={{ db_port }}"
      Environment="DB_NAME={{ db_name }}"
      Environment="DB_USER={{ db_user }}"
      Environment="DB_PASSWORD={{ db_password }}"
      ExecStart=/usr/bin/java -jar backend.jar
      Restart=always

      [Install]
      WantedBy=multi-user.target
  notify: 
    - daemon-reload
    - restart backend

# ============================================
# 5. Фронтенд: Распаковка
# ============================================
- name: Download and unpack frontend
  unarchive:
    src: "{{ nexus_url }}/repository/{{ nexus_repo }}/{{ project_name }}/{{ pipeline_id }}/frontend/frontend.tar.gz"
    dest: "{{ web_root }}"
    remote_src: yes
    url_username: "{{ nexus_user }}"
    url_password: "{{ nexus_password }}"
    owner: "{{ deploy_user }}"

# ============================================
# 6. Nginx: Генерация конфига
# ============================================
- name: Generate Nginx Config
  copy:
    dest: "/etc/nginx/sites-enabled/{{ project_name }}.conf"
    content: |
      server {
          listen 80;
          server_name {{ ansible_host }};

          root {{ web_root }};
          index index.html;

          location / {
              try_files $uri $uri/ /index.html;
          }

          location /api/ {
              proxy_pass http://localhost:{{ backend_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
          }
      }
  notify: restart nginx

- name: Force handlers (start services now)
  meta: flush_handlers
