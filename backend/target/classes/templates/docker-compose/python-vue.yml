version: '3.8'

services:
  postgres:
    image: localhost:5051/{{project-name}}/db:${PIPELINE_ID}
    container_name: {{project-name}}-db
    restart: always
    environment:
      POSTGRES_DB: {{project_name}}_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: localhost:5051/{{project-name}}/backend:${PIPELINE_ID}
    container_name: {{project-name}}-backend
    restart: always
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME={{project_name}}_db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: localhost:5051/{{project-name}}/frontend:${PIPELINE_ID}
    container_name: {{project-name}}-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: