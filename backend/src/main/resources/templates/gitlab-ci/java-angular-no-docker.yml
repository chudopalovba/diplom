stages:
  - build
  - test
  - sonar
  - push
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  NEXUS_REPO_RAW: "java-raw"

build-backend:
  stage: build
  image: localhost:5000/maven:3.9.6-eclipse-temurin-17
  tags:
    - java
  script:
    - cd backend
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar
      - backend/target/classes/
      - database/
    expire_in: 1 hour

build-frontend:
  stage: build
  image: localhost:5000/node:20-alpine
  tags:
    - node
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

test-backend:
  stage: test
  image: localhost:5000/maven:3.9-eclipse-temurin-17
  tags:
    - java
  script:
    - cd backend
    - mvn test || true
  allow_failure: true

test-frontend:
  stage: test
  image: localhost:5000/node:20-alpine
  tags:
    - node
  script:
    - cd frontend
    - npm install
    - npm run test -- --no-watch || true
  allow_failure: true

sonar-scan:
  stage: sonar
  image: localhost:5000/sonar-scanner-cli:12.0.0.3214_8.0.1
  tags:
    - sonar
  script:
    - >
      sonar-scanner
      -Dsonar.projectKey=${CI_PROJECT_NAME}
      -Dsonar.sources=backend/src
      -Dsonar.java.binaries=backend/target/classes
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.token=${SONAR_TOKEN}
      -Dsonar.qualitygate.wait=false
  dependencies:
    - build-backend

push-artifacts-back:
  stage: push
  image: localhost:5000/curlimages/curl:latest
  tags:
    - java
  script:
    - JAR_FILE=$(ls backend/target/*.jar | head -1)
    - >
      curl -v --user "${NEXUS_USER}:${NEXUS_PASSWORD}"
      --upload-file "${JAR_FILE}"
      "${NEXUS_URL}/repository/${NEXUS_REPO_RAW}/${CI_PROJECT_NAME}/${CI_PIPELINE_ID}/backend/$(basename ${JAR_FILE})"
    - tar -czf database.tar.gz -C database .
    - >
      curl -v --user "${NEXUS_USER}:${NEXUS_PASSWORD}"
      --upload-file database.tar.gz
      "${NEXUS_URL}/repository/${NEXUS_REPO_RAW}/${CI_PROJECT_NAME}/${CI_PIPELINE_ID}/database/database.tar.gz"
  dependencies:
    - build-backend

push-artifacts-front:
  stage: push
  image: localhost:5000/curlimages/curl:latest
  tags:
    - node
  script:
    - tar -czf frontend.tar.gz -C frontend/dist .
    - >
      curl -v --user "${NEXUS_USER}:${NEXUS_PASSWORD}"
      --upload-file frontend.tar.gz
      "${NEXUS_URL}/repository/${NEXUS_REPO_RAW}/${CI_PROJECT_NAME}/${CI_PIPELINE_ID}/frontend/frontend.tar.gz"
  dependencies:
    - build-frontend

deploy-proj:
  stage: deploy
  image: localhost:5000/cytopia/ansible:2.13
  tags:
    - ansible
  when: manual
  before_script:
    - mkdir -p ~/.ssh
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H ${DEPLOY_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - cd ansible
    - >
      ansible-playbook -i inventory playbook.yml
      -e "nexus_url=${NEXUS_URL}"
      -e "nexus_repo=${NEXUS_REPO_RAW}"
      -e "nexus_user=${NEXUS_USER}"
      -e "nexus_password=${NEXUS_PASSWORD}"
      -e "project_name=${CI_PROJECT_NAME}"
      -e "pipeline_id=${CI_PIPELINE_ID}"
      -e "db_host=${DB_HOST}"
      -e "db_port=${DB_PORT}"
      -e "db_name=${DB_NAME}"
      -e "db_user=${DB_USER}"
      -e "db_password=${DB_PASSWORD}"
      -e "backend_type=java"
      -e "frontend_type=angular"
      -e "use_docker=false"