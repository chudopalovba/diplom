stages:
  - build
  - test
  - sonar
  - push
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  NEXUS_REPO_RAW: "configs-hosted"
  DOCKER_REGISTRY: "192.168.0.102:5001"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"
  BACKEND_IMAGE: "${DOCKER_REGISTRY}/${CI_PROJECT_NAME}/backend:${CI_PIPELINE_ID}"
  FRONTEND_IMAGE: "${DOCKER_REGISTRY}/${CI_PROJECT_NAME}/frontend:${CI_PIPELINE_ID}"
  DB_IMAGE: "${DOCKER_REGISTRY}/${CI_PROJECT_NAME}/db:${CI_PIPELINE_ID}"

build-backend-for-sonarqube:
  stage: build
  image: localhost:5000/maven:3.9.6-eclipse-temurin-17
  tags:
    - java
  script:
    - cd backend
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar
      - backend/target/classes/
    expire_in: 1 hour

build-backend:
  stage: build
  image: localhost:5000/docker:24
  tags:
    - docker
  services:
    - name: localhost:5000/docker:24-dind
      alias: docker
      command: ["--insecure-registry=192.168.0.102:5001"]
  script:
    - docker build -t ${BACKEND_IMAGE} ./backend

build-frontend:
  stage: build
  image: localhost:5000/docker:24
  tags:
    - docker
  services:
    - name: localhost:5000/docker:24-dind
      alias: docker
      command: ["--insecure-registry=192.168.0.102:5001"]
  script:
    - docker build -t ${FRONTEND_IMAGE} ./frontend

test-backend:
  stage: test
  image: localhost:5000/maven:3.9.6-eclipse-temurin-17
  tags:
    - java
  script:
    - cd backend
    - mvn test || true
  allow_failure: true

test-frontend:
  stage: test
  image: localhost:5000/node:20-alpine
  tags:
    - node
  script:
    - cd frontend
    - npm install
    - npm run test -- --watchAll=false || true
  allow_failure: true

sonar-scan:
  stage: sonar
  image: localhost:5000/sonar-scanner-cli:12.0.0.3214_8.0.1
  tags:
    - sonar
  script:
    - >
      sonar-scanner
      -Dsonar.projectKey=${CI_PROJECT_NAME}
      -Dsonar.sources=backend/src
      -Dsonar.java.binaries=backend/target/classes
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.token=${SONAR_TOKEN}
      -Dsonar.qualitygate.wait=false
  dependencies:
    - build-backend-for-sonarqube

push-artifacts-back:
  stage: push
  image: localhost:5000/docker:24
  tags:
    - docker
  services:
    - name: localhost:5000/docker:24-dind
      alias: docker
      command: ["--insecure-registry=192.168.0.102:5001"]
  script:
    - docker build -t ${BACKEND_IMAGE} ./backend
    - echo "${NEXUS_PASSWORD}" | docker login ${DOCKER_REGISTRY} -u ${NEXUS_USER} --password-stdin
    - docker push ${BACKEND_IMAGE}
    - docker build -t ${DB_IMAGE} ./database
    - docker push ${DB_IMAGE}

push-artifacts-front:
  stage: push
  image: localhost:5000/docker:24
  tags:
    - docker
  services:
    - name: localhost:5000/docker:24-dind
      alias: docker
      command: ["--insecure-registry=192.168.0.102:5001"]
  script:
    - docker build -t ${FRONTEND_IMAGE} ./frontend
    - echo "${NEXUS_PASSWORD}" | docker login ${DOCKER_REGISTRY} -u ${NEXUS_USER} --password-stdin
    - docker push ${FRONTEND_IMAGE}
    - |
      apk add --no-cache curl
      curl -v --user "${NEXUS_USER}:${NEXUS_PASSWORD}" \
        --upload-file docker-compose.yml \
        "${NEXUS_URL}/repository/${NEXUS_REPO_RAW}/${CI_PROJECT_NAME}/${CI_PIPELINE_ID}/docker-compose.yml"

deploy-proj:
  stage: deploy
  image: localhost:5000/cytopia/ansible:2.13
  tags:
    - ansible
  when: manual
  before_script:
    - mkdir -p ~/.ssh
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H ${DEPLOY_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - cd ansible
    - >
      ansible-playbook -i inventory playbook.yml
      -e "nexus_url=${NEXUS_URL}"
      -e "nexus_repo=${NEXUS_REPO_RAW}"
      -e "nexus_user=${NEXUS_USER}"
      -e "nexus_password=${NEXUS_PASSWORD}"
      -e "docker_registry=${DOCKER_REGISTRY}"
      -e "project_name=${CI_PROJECT_NAME}"
      -e "pipeline_id=${CI_PIPELINE_ID}"
      -e "db_name=${DB_NAME}"
      -e "db_user=${DB_USER}"
      -e "db_password=${DB_PASSWORD}"
      -e "backend_type=java"
      -e "frontend_type=react"
      -e "use_docker=true"