stages:
  - build
  - test
  - sonar
  - push
  - deploy

variables:
  NEXUS_URL: "http://localhost:8081"
  NEXUS_REPO_RAW: "csharp-row"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

# ======================== BUILD ========================

build-backend:
  stage: build
  image: localhost:5000/dotnet/sdk:8.0
  tags:
    - dotnet
  script:
    - cd backend
    - dotnet restore
    - dotnet publish -c Release -o publish
  artifacts:
    paths:
      - backend/publish/
    expire_in: 1 hour

build-frontend:
  stage: build
  image: localhost:5000/node:20-alpine
  tags:
    - node
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

# ======================== TEST ========================

test-backend:
  stage: test
  image: localhost:5000/dotnet/sdk:8.0
  tags:
    - dotnet
  script:
    - cd backend
    - dotnet test || true
  allow_failure: true

test-frontend:
  stage: test
  image: localhost:5000/node:20-alpine
  tags:
    - node
  script:
    - cd frontend
    - npm ci
    - npm run test -- --run || true
  allow_failure: true

# ======================== SONAR ========================

sonar-scan:
  stage: sonar
  image: localhost:5000/sonar-scanner-cli:12.0.0.3214_8.0.1
  tags:
    - sonar
  script:
    - >
      sonar-scanner
      -Dsonar.projectKey=${CI_PROJECT_NAME}
      -Dsonar.sources=backend
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.qualitygate.wait=false
  dependencies:
    - build-backend

# ======================== PUSH ========================

push-artifacts-back:
  stage: push
  image: localhost:5000/curlimages/curl:latest
  tags:
    - dotnet
  script:
    - tar -czf backend.tar.gz -C backend/publish .
    - >
      curl -v --user "${NEXUS_USER}:${NEXUS_PASSWORD}"
      --upload-file backend.tar.gz
      "${NEXUS_URL}/repository/${NEXUS_REPO_RAW}/${CI_PROJECT_NAME}/${CI_PIPELINE_ID}/backend/backend.tar.gz"
  dependencies:
    - build-backend

push-artifacts-front:
  stage: push
  image: localhost:5000/curlimages/curl:latest
  tags:
    - node
  script:
    - tar -czf frontend.tar.gz -C frontend/dist .
    - >
      curl -v --user "${NEXUS_USER}:${NEXUS_PASSWORD}"
      --upload-file frontend.tar.gz
      "${NEXUS_URL}/repository/${NEXUS_REPO_RAW}/${CI_PROJECT_NAME}/${CI_PIPELINE_ID}/frontend/frontend.tar.gz"
  dependencies:
    - build-frontend

# ======================== DEPLOY ========================

deploy-proj:
  stage: deploy
  image: localhost:5000/cytopia/ansible:2.13
  tags:
    - ansible
  when: manual
  before_script:
    - mkdir -p ~/.ssh
    - echo "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H ${DEPLOY_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - cd ansible
    - >
      ansible-playbook -i inventory playbook.yml
      -e "nexus_url=${NEXUS_URL}"
      -e "nexus_repo=${NEXUS_REPO_RAW}"
      -e "nexus_user=${NEXUS_USER}"
      -e "nexus_password=${NEXUS_PASSWORD}"
      -e "project_name=${CI_PROJECT_NAME}"
      -e "pipeline_id=${CI_PIPELINE_ID}"
      -e "db_host=${DB_HOST}"
      -e "db_port=${DB_PORT}"
      -e "db_name=${DB_NAME}"
      -e "db_user=${DB_USER}"
      -e "db_password=${DB_PASSWORD}"
      -e "backend_type=csharp"
      -e "frontend_type=vue"
      -e "use_docker=false"