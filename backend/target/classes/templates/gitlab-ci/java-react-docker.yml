stages:
  - build
  - test
  - docker
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DOCKER_REGISTRY: ${NEXUS_DOCKER_URL}
  BACKEND_IMAGE: ${NEXUS_DOCKER_URL}/${CI_PROJECT_NAME}-backend
  FRONTEND_IMAGE: ${NEXUS_DOCKER_URL}/${CI_PROJECT_NAME}-frontend
  IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}

cache:
  paths:
    - .m2/repository/
    - frontend/node_modules/

# ══════════════════════════════════════════════
#  BUILD (compile artifacts for tests)
# ══════════════════════════════════════════════

build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-17-alpine
  script:
    - cd backend
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 1 hour

build-frontend:
  stage: build
  image: node:18-alpine
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

# ══════════════════════════════════════════════
#  TEST
# ══════════════════════════════════════════════

test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17-alpine
  script:
    - cd backend
    - mvn test
  allow_failure: true

# ══════════════════════════════════════════════
#  DOCKER BUILD & PUSH TO NEXUS REGISTRY
# ══════════════════════════════════════════════

docker-build-push:
  stage: docker
  image: docker:24
  services:
    - name: docker:24-dind
      variables:
        DOCKER_TLS_CERTDIR: ""
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "${NEXUS_PASSWORD}" | docker login -u "${NEXUS_USER}" --password-stdin ${DOCKER_REGISTRY}
  script:
    # Backend image
    - docker build -t ${BACKEND_IMAGE}:${IMAGE_TAG} -t ${BACKEND_IMAGE}:latest ./backend
    - docker push ${BACKEND_IMAGE}:${IMAGE_TAG}
    - docker push ${BACKEND_IMAGE}:latest
    # Frontend image
    - docker build -t ${FRONTEND_IMAGE}:${IMAGE_TAG} -t ${FRONTEND_IMAGE}:latest ./frontend
    - docker push ${FRONTEND_IMAGE}:${IMAGE_TAG}
    - docker push ${FRONTEND_IMAGE}:latest
  only:
    - main

# ══════════════════════════════════════════════
#  DEPLOY — pull images & docker compose up
# ══════════════════════════════════════════════

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    # Копируем prod docker-compose на сервер
    - scp -i ~/.ssh/id_rsa docker-compose.prod.yml ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/${CI_PROJECT_NAME}/docker-compose.yml
    - scp -i ~/.ssh/id_rsa database/init.sql ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/${CI_PROJECT_NAME}/init.sql 2>/dev/null || true
    # SSH: login, pull, up
    - |
      ssh -i ~/.ssh/id_rsa ${DEPLOY_USER}@${DEPLOY_HOST} "
        cd /opt/${CI_PROJECT_NAME} &&
        export DOCKER_REGISTRY=${DOCKER_REGISTRY} &&
        export PROJECT_NAME=${CI_PROJECT_NAME} &&
        export IMAGE_TAG=${IMAGE_TAG} &&
        export DB_USER=${DB_USER:-postgres} &&
        export DB_PASSWORD=${DB_PASSWORD:-postgres} &&
        echo '${NEXUS_PASSWORD}' | docker login -u '${NEXUS_USER}' --password-stdin ${DOCKER_REGISTRY} &&
        docker compose pull &&
        docker compose up -d --remove-orphans
      "
  environment:
    name: production
    url: http://${DEPLOY_HOST}:3000
  only:
    - main
  when: manual